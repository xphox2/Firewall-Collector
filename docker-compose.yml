services:
  firewall-collector:
    image: xphox/firewall-collector:1.2
    # build: .  # Uncomment to build locally instead of pulling from Docker Hub
    restart: unless-stopped
    stop_grace_period: 30s

    # Host networking: container shares the host's network stack directly.
    # SNMP, ICMP, and all listeners use the host's IP — no NAT/bridge issues.
    # Note: "ports:" section is ignored when network_mode is host.
    #
    # SECURITY TRADEOFF: `network_mode: host` removes container network
    # isolation. Combined with the rootless USER in the Dockerfile and the
    # cap_drop below, a parser RCE still cannot escalate to a root shell on
    # the host — but it CAN bind to any local port. If you don't need raw
    # host networking (e.g. the probe is on a dedicated VLAN and you only
    # use the default listeners), you can switch to bridged mode and map
    # the four UDP/TCP ports explicitly:
    #   network_mode: <unset, default bridge>
    #   ports:
    #     - "162:162/udp"   # SNMP traps
    #     - "514:514/tcp"   # syslog (TCP)
    #     - "514:514/udp"   # syslog (UDP)
    #     - "6343:6343/udp" # sFlow
    #     - "69:69/udp"     # TFTP config backup
    # When bridged, ICMP via the fork-exec `ping` still works (NET_RAW cap
    # covers it) but you lose the host-IP source address for outbound
    # SNMP/SSH to devices. Test thoroughly before switching in production.
    network_mode: host

    # Defense in depth (AUDIT-047): drop every default capability, then
    # re-add only the one we actually need for ICMP echo via fork-exec
    # `ping`. The container runs as `nobody` (uid 65534) via the Dockerfile
    # USER directive, so even with NET_RAW a parser RCE is unprivileged.
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW           # ICMP ping (raw socket)
      - NET_BIND_SERVICE  # bind privileged ports 69/162/514 as the rootless 'nobody' user
    # NOTE: do NOT add a `sysctls:` block while `network_mode: host` is set —
    # Docker/runc rejects network-namespaced sysctls (e.g.
    # net.ipv4.ping_group_range) in the host net namespace and fails with
    # "failed to create shim task: ... not allowed with host net namespace".
    # NET_RAW already grants raw ICMP, so the sysctl is unnecessary here. If you
    # switch to bridged networking, set ping_group_range on the container there.

    environment:
      # Required — registration key from admin panel
      PROBE_REGISTRATION_KEY: ""
      PROBE_SERVER_URL: "https://stats.technicallabs.org"

      # Intervals (seconds)
      PROBE_HEARTBEAT_INTERVAL: "60"
      PROBE_SYNC_INTERVAL: "30"
      PROBE_POLL_INTERVAL: "60"
      PROBE_DEVICE_REFRESH_INTERVAL: "300"
      PROBE_PING_INTERVAL: "60"
      PROBE_PING_TIMEOUT: "5"
      PROBE_PING_COUNT: "4"

      # Listener configuration
      PROBE_LISTEN_ADDR: "0.0.0.0"
      PROBE_SNMP_TRAP_PORT: "162"
      PROBE_SYSLOG_PORT: "514"
      PROBE_SFLOW_PORT: "6343"
      PROBE_SNMP_TRAP_COMMUNITY: ""   # OPTIONAL allowlist filter; empty = accept traps from any community (per-device communities live on the server)

      # Feature toggles (set to "false" to disable)
      PROBE_SNMP_TRAP_ENABLED: "true"
      PROBE_SYSLOG_ENABLED: "true"
      PROBE_SFLOW_ENABLED: "true"
      PROBE_PING_ENABLED: "true"

    # Uncomment to mount custom TLS certificates
    # volumes:
    #   - ./certs/ca.pem:/app/certs/ca.pem:ro
    #   - ./certs/client.pem:/app/certs/client.pem:ro
    #   - ./certs/client-key.pem:/app/certs/client-key.pem:ro
    # environment:
    #   PROBE_CA_CERT_FILE: "/app/certs/ca.pem"
    #   PROBE_TLS_CERT_FILE: "/app/certs/client.pem"
    #   PROBE_TLS_KEY_FILE: "/app/certs/client-key.pem"
